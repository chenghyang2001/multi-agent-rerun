<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Agent Rerun — 圖片瀏覽器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
#header { background: #1e293b; padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 1px solid #334155; }
#header h1 { font-size: 14px; font-weight: 600; color: #38bdf8; white-space: nowrap; }
#header-path { font-size: 12px; color: #64748b; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#counter { font-size: 12px; color: #94a3b8; white-space: nowrap; }
#hint { font-size: 11px; color: #475569; white-space: nowrap; }
#zoom-badge { background: #334155; border-radius: 4px; padding: 2px 7px; font-size: 11px; color: #94a3b8; }
#main-area { flex: 1; display: flex; overflow: hidden; min-height: 0; }
#sidebar { width: 190px; flex-shrink: 0; background: #1e293b; border-right: 1px solid #334155; overflow-y: auto; padding: 8px 6px; }
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
.grp-btn { width: 100%; text-align: left; padding: 7px 10px; border-radius: 5px; border: 1px solid transparent; background: transparent; color: #94a3b8; font-size: 12px; cursor: pointer; margin-bottom: 3px; transition: background .12s, color .12s; display: flex; justify-content: space-between; align-items: center; }
.grp-btn:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
.grp-btn.active { background: #1e3a5f; border-color: #38bdf8; color: #e0f2fe; }
.grp-count { font-size: 10px; background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 8px; color: #64748b; }
.grp-btn.active .grp-count { background: rgba(56,189,248,0.18); color: #7dd3fc; }
#viewer-col { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#viewer-wrap { flex: 1; overflow: hidden; position: relative; background: #0f172a; cursor: grab; }
#viewer-wrap.dragging { cursor: grabbing; }
#main-img { position: absolute; top: 0; left: 0; transform-origin: 0 0; user-select: none; pointer-events: none; max-width: none; }
#prev-btn, #next-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(30,41,59,0.85); border: 1px solid #334155; color: #38bdf8; font-size: 20px; width: 36px; height: 58px; cursor: pointer; border-radius: 5px; z-index: 10; display: flex; align-items: center; justify-content: center; }
#prev-btn { left: 8px; } #next-btn { right: 8px; }
#prev-btn:hover, #next-btn:hover { background: rgba(56,189,248,0.2); }
#thumbs-wrap { flex-shrink: 0; background: #1e293b; border-top: 1px solid #334155; height: 74px; overflow-x: auto; overflow-y: hidden; display: flex; gap: 5px; padding: 5px 8px; }
#thumbs-wrap::-webkit-scrollbar { height: 3px; }
#thumbs-wrap::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
.thumb { flex-shrink: 0; height: 64px; width: auto; border: 2px solid transparent; border-radius: 3px; cursor: pointer; opacity: .55; transition: opacity .12s, border-color .12s; }
.thumb:hover { opacity: .8; }
.thumb.active { border-color: #38bdf8; opacity: 1; }
</style>
</head>
<body>
<div id="header">
  <h1>Multi Agent Rerun</h1>
  <span id="header-path"></span>
  <span id="counter"></span>
  <span id="hint">← → 換圖 · 滾輪縮放 · 拖曳平移 · 雙擊還原</span>
  <span id="zoom-badge">100%</span>
</div>
<div id="main-area">
  <div id="sidebar"></div>
  <div id="viewer-col">
    <div id="viewer-wrap">
      <button id="prev-btn">&#9664;</button>
      <img id="main-img" src="" alt="">
      <button id="next-btn">&#9654;</button>
    </div>
    <div id="thumbs-wrap"></div>
  </div>
</div>
<script>
const GROUPS = [{"label": "Parallel Pdf Read", "images": [{"file": "demo-01-parallel-pdf-read/png/parallel-pdf-read-01-心智圖.png", "label": "parallel pdf read 01 心智圖"}, {"file": "demo-01-parallel-pdf-read/png/parallel-pdf-read-02-流程圖.png", "label": "parallel pdf read 02 流程圖"}, {"file": "demo-01-parallel-pdf-read/png/parallel-pdf-read-03-系統架構圖.png", "label": "parallel pdf read 03 系統架構圖"}, {"file": "demo-01-parallel-pdf-read/png/parallel-pdf-read-04-序列圖.png", "label": "parallel pdf read 04 序列圖"}]}, {"label": "Worktree Analysis", "images": [{"file": "demo-02-worktree-analysis/png/worktree-analysis-01-心智圖.png", "label": "worktree analysis 01 心智圖"}, {"file": "demo-02-worktree-analysis/png/worktree-analysis-02-流程圖.png", "label": "worktree analysis 02 流程圖"}, {"file": "demo-02-worktree-analysis/png/worktree-analysis-03-系統架構圖.png", "label": "worktree analysis 03 系統架構圖"}]}, {"label": "Parallel Infographic", "images": [{"file": "demo-03-parallel-infographic/png/parallel-infographic-01-心智圖.png", "label": "parallel infographic 01 心智圖"}, {"file": "demo-03-parallel-infographic/png/parallel-infographic-02-流程圖.png", "label": "parallel infographic 02 流程圖"}, {"file": "demo-03-parallel-infographic/png/parallel-infographic-03-系統架構圖.png", "label": "parallel infographic 03 系統架構圖"}]}, {"label": "Parallel Search", "images": [{"file": "demo-04-parallel-search/png/parallel-search-01-心智圖.png", "label": "parallel search 01 心智圖"}, {"file": "demo-04-parallel-search/png/parallel-search-02-流程圖.png", "label": "parallel search 02 流程圖"}, {"file": "demo-04-parallel-search/png/parallel-search-03-系統架構圖.png", "label": "parallel search 03 系統架構圖"}]}, {"label": "Research Team", "images": [{"file": "demo-06-research-team/png/research-team-01-心智圖.png", "label": "research team 01 心智圖"}, {"file": "demo-06-research-team/png/research-team-02-流程圖.png", "label": "research team 02 流程圖"}, {"file": "demo-06-research-team/png/research-team-03-系統架構圖.png", "label": "research team 03 系統架構圖"}, {"file": "demo-06-research-team/png/research-team-04-序列圖.png", "label": "research team 04 序列圖"}]}, {"label": "Agent Teams Fanout", "images": [{"file": "demo-07-agent-teams-fanout/png/agent-teams-fanout-01-心智圖.png", "label": "agent teams fanout 01 心智圖"}, {"file": "demo-07-agent-teams-fanout/png/agent-teams-fanout-02-流程圖.png", "label": "agent teams fanout 02 流程圖"}, {"file": "demo-07-agent-teams-fanout/png/agent-teams-fanout-03-系統架構圖.png", "label": "agent teams fanout 03 系統架構圖"}, {"file": "demo-07-agent-teams-fanout/png/agent-teams-fanout-04-序列圖.png", "label": "agent teams fanout 04 序列圖"}]}, {"label": "Comparison", "images": [{"file": "demo-08-comparison/png/subagent-vs-teams-01-心智圖.png", "label": "subagent vs teams 01 心智圖"}, {"file": "demo-08-comparison/png/subagent-vs-teams-02-流程圖.png", "label": "subagent vs teams 02 流程圖"}, {"file": "demo-08-comparison/png/subagent-vs-teams-03-系統架構圖.png", "label": "subagent vs teams 03 系統架構圖"}]}, {"label": "3Agent Dashboard", "images": [{"file": "demo-09-3agent-dashboard/png/3agent-dashboard-01-心智圖.png", "label": "3agent dashboard 01 心智圖"}, {"file": "demo-09-3agent-dashboard/png/3agent-dashboard-02-流程圖.png", "label": "3agent dashboard 02 流程圖"}, {"file": "demo-09-3agent-dashboard/png/3agent-dashboard-03-系統架構圖.png", "label": "3agent dashboard 03 系統架構圖"}]}, {"label": "Parallel Epub", "images": [{"file": "demo-10-parallel-epub/png/parallel-epub-01-心智圖.png", "label": "parallel epub 01 心智圖"}, {"file": "demo-10-parallel-epub/png/parallel-epub-02-流程圖.png", "label": "parallel epub 02 流程圖"}, {"file": "demo-10-parallel-epub/png/parallel-epub-03-系統架構圖.png", "label": "parallel epub 03 系統架構圖"}]}, {"label": "Parallel Skills", "images": [{"file": "demo-11-parallel-skills/png/skills-audit-01-心智圖.png", "label": "skills audit 01 心智圖"}, {"file": "demo-11-parallel-skills/png/skills-audit-02-流程圖.png", "label": "skills audit 02 流程圖"}, {"file": "demo-11-parallel-skills/png/skills-audit-03-系統架構圖.png", "label": "skills audit 03 系統架構圖"}]}, {"label": "Agent Teams Qa", "images": [{"file": "demo-12-agent-teams-qa/png/agent-teams-qa-01-心智圖.png", "label": "agent teams qa 01 心智圖"}, {"file": "demo-12-agent-teams-qa/png/agent-teams-qa-02-流程圖.png", "label": "agent teams qa 02 流程圖"}, {"file": "demo-12-agent-teams-qa/png/agent-teams-qa-03-系統架構圖.png", "label": "agent teams qa 03 系統架構圖"}]}, {"label": "Parallel Pptx", "images": [{"file": "demo-13-parallel-pptx/png/parallel-pptx-01-心智圖.png", "label": "parallel pptx 01 心智圖"}, {"file": "demo-13-parallel-pptx/png/parallel-pptx-02-流程圖.png", "label": "parallel pptx 02 流程圖"}, {"file": "demo-13-parallel-pptx/png/parallel-pptx-03-系統架構圖.png", "label": "parallel pptx 03 系統架構圖"}]}, {"label": "Live Demo", "images": [{"file": "demo-14-live-demo/png/live-demo-01-心智圖.png", "label": "live demo 01 心智圖"}, {"file": "demo-14-live-demo/png/live-demo-02-流程圖.png", "label": "live demo 02 流程圖"}, {"file": "demo-14-live-demo/png/live-demo-03-系統架構圖.png", "label": "live demo 03 系統架構圖"}]}, {"label": "Agent Teams Iterative", "images": [{"file": "demo-15-agent-teams-iterative/png/iterative-team-01-心智圖.png", "label": "iterative team 01 心智圖"}, {"file": "demo-15-agent-teams-iterative/png/iterative-team-02-狀態圖.png", "label": "iterative team 02 狀態圖"}, {"file": "demo-15-agent-teams-iterative/png/iterative-team-03-流程圖.png", "label": "iterative team 03 流程圖"}, {"file": "demo-15-agent-teams-iterative/png/iterative-team-04-系統架構圖.png", "label": "iterative team 04 系統架構圖"}]}, {"label": "Nlm Downloader Bugfix", "images": [{"file": "demo-18-nlm-downloader-bugfix/png/nlm-bugfix-01-心智圖.png", "label": "nlm bugfix 01 心智圖"}, {"file": "demo-18-nlm-downloader-bugfix/png/nlm-bugfix-02-狀態圖.png", "label": "nlm bugfix 02 狀態圖"}, {"file": "demo-18-nlm-downloader-bugfix/png/nlm-bugfix-03-流程圖.png", "label": "nlm bugfix 03 流程圖"}, {"file": "demo-18-nlm-downloader-bugfix/png/nlm-bugfix-04-系統架構圖.png", "label": "nlm bugfix 04 系統架構圖"}]}, {"label": "Costco Auto Order", "images": [{"file": "demo-19-costco-auto-order/png/costco-auto-order-01-心智圖.png", "label": "costco auto order 01 心智圖"}, {"file": "demo-19-costco-auto-order/png/costco-auto-order-02-流程圖.png", "label": "costco auto order 02 流程圖"}, {"file": "demo-19-costco-auto-order/png/costco-auto-order-03-狀態圖.png", "label": "costco auto order 03 狀態圖"}, {"file": "demo-19-costco-auto-order/png/costco-auto-order-04-系統架構圖.png", "label": "costco auto order 04 系統架構圖"}]}];

let curGroup = 0, curImg = 0, scale = 1, tx = 0, ty = 0;
let dragging = false, dragX = 0, dragY = 0;

const sidebar    = document.getElementById('sidebar');
const viewer     = document.getElementById('viewer-wrap');
const img        = document.getElementById('main-img');
const badge      = document.getElementById('zoom-badge');
const counter    = document.getElementById('counter');
const headerPath = document.getElementById('header-path');
const thumbsWrap = document.getElementById('thumbs-wrap');

function applyTransform() {
  img.style.transform = 'matrix(' + scale + ',0,0,' + scale + ',' + tx + ',' + ty + ')';
  badge.textContent = Math.round(scale * 100) + '%';
}
function fitImage() {
  const PAD = 24;
  if (!img.naturalWidth) return;
  scale = Math.min((viewer.clientWidth - PAD*2) / img.naturalWidth,
                   (viewer.clientHeight - PAD*2) / img.naturalHeight);
  tx = (viewer.clientWidth  - img.naturalWidth  * scale) / 2;
  ty = (viewer.clientHeight - img.naturalHeight * scale) / 2;
  applyTransform();
}
function loadGroup(gi) {
  curGroup = gi; curImg = 0;
  document.querySelectorAll('.grp-btn').forEach((b, i) => b.classList.toggle('active', i === gi));
  renderThumbs(); showImage(0);
}
function renderThumbs() {
  thumbsWrap.innerHTML = '';
  GROUPS[curGroup].images.forEach((entry, i) => {
    const t = document.createElement('img');
    t.src = entry.file; t.className = 'thumb'; t.title = entry.label;
    t.addEventListener('click', () => showImage(i));
    thumbsWrap.appendChild(t);
  });
}
function showImage(idx) {
  const grp = GROUPS[curGroup];
  curImg = (idx + grp.images.length) % grp.images.length;
  const entry = grp.images[curImg];
  img.onload = fitImage;
  img.src = entry.file;
  scale = 1; tx = 0; ty = 0;
  counter.textContent = (curImg + 1) + ' / ' + grp.images.length;
  headerPath.textContent = grp.label + ' › ' + entry.label;
  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === curImg));
  const active = thumbsWrap.children[curImg];
  if (active) active.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
}
GROUPS.forEach((g, i) => {
  const btn = document.createElement('button');
  btn.className = 'grp-btn' + (i === 0 ? ' active' : '');
  btn.innerHTML = '<span>' + g.label + '</span><span class="grp-count">' + g.images.length + '</span>';
  btn.addEventListener('click', () => loadGroup(i));
  sidebar.appendChild(btn);
});
document.getElementById('prev-btn').addEventListener('click', () => showImage(curImg - 1));
document.getElementById('next-btn').addEventListener('click', () => showImage(curImg + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') showImage(curImg + 1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') showImage(curImg - 1);
});
viewer.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.13 : 1/1.13;
  const newScale = Math.min(Math.max(scale * factor, 0.1), 25);
  const vr = viewer.getBoundingClientRect();
  const cx = e.clientX - vr.left, cy = e.clientY - vr.top;
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale; applyTransform();
}, { passive: false });
viewer.addEventListener('mousedown', e => {
  dragging = true; dragX = e.clientX - tx; dragY = e.clientY - ty;
  viewer.classList.add('dragging');
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = e.clientX - dragX; ty = e.clientY - dragY; applyTransform();
});
document.addEventListener('mouseup', () => { dragging = false; viewer.classList.remove('dragging'); });
viewer.addEventListener('dblclick', fitImage);
loadGroup(0);
</script>
</body>
</html>
